<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Tracker</title>
    <link rel="script" href="script.js">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container" id="app-container">
        
        <!-- Header -->
        <div class="header">
            <h1>Attendance</h1>
            <button id="logout-btn" class="logout-btn hidden">Sign Out</button>
        </div>

        <!-- Notification -->
        <div id="notification" class="notification hidden"></div>

        <!-- Login View -->
        <div id="login-view" class="view-content">
            <div class="text-center mb-4">
                <p class="text-gray" style="line-height: 1.5;">Enter Credentials</p>
                <div id="manual-db-upload" class="hidden fallback-upload">
                    <p style="margin-bottom:0.5rem;">Database File (JSON):</p>
                    <input type="file" id="json-file-input" accept=".json" style="width:100%">
                </div>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Username / Student ID</label>
                    <input type="text" id="student-id" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view-content hidden">
            <div class="mb-4">
                <p style="font-size: 1.125rem; margin-bottom: 0.5rem; color: #111;">Welcome, <span id="user-real-name">Student</span></p>
                <p id="current-timestamp" class="text-small text-gray">Time: ...</p>
            </div>

            <div class="form-group">
                <label class="form-label" style="text-align: center; margin-bottom: 1rem;">Session Code</label>
                <div class="sig-container">
                    <div id="generated-sig-code" class="sig-code-display"></div>
                </div>
            </div>

            <button id="submit-attendance" class="btn-success">Verify & Submit Attendance</button>

            <!-- Recent Logs -->
            <div class="attendance-section">
                <h3 class="section-title">Session Record</h3>
                <div id="attendance-list" class="log-list"></div>
            </div>
        </div>

    </div>

    
</body>
</html>
